set-option -g default-shell /bin/zsh

# True color settings — tmux-256color inside panes, passthrough Tc for RGB
set -s default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# OSC 52 clipboard passthrough — lets neovim and tmux copy-mode write directly
# to the Windows clipboard over SSH via WezTerm
set -wg allow-passthrough on
set -g set-clipboard off  # disable Ms re-emit — osc52.sh writes directly to TTY
set -as terminal-features ",xterm*:clipboard"
set -ag terminal-overrides ",xterm-256color:Ms=\E]52;%p1%s;%p2%s\007"
set -ag terminal-overrides ",screen*:Ms=\E]52;%p1%s;%p2%s\007"

# Disable extended-key / XTVERSION probing (tmux 3.3+) — prevents garbled
# output in the first pane when running over multi-hop SSH due to latency
# causing WezTerm's DCS response to arrive after pane input routing starts
set -s extended-keys off

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# set base number to 1
set -g base-index 1
setw -g pane-base-index 1

# split panes using | and - and use current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# renumber windows automatically in order - manual is done with `movew -r`
set-option -g renumber-windows on

# switch panes using ctrl+vim without prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# vim motions for moving and copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
# Pipe selection directly to osc52.sh which writes OSC 52 to the outer TTY.
# copy-pipe-and-cancel exits copy mode cleanly and sends selection on stdin —
# no run-shell needed, no garbage output in the pane.
bind-key -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel '~/.config/tmux/osc52.sh'
bind-key -T copy-mode-vi Enter             send-keys -X copy-pipe-and-cancel '~/.config/tmux/osc52.sh'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel '~/.config/tmux/osc52.sh'
bind-key -T copy-mode-vi C-j               send-keys -X copy-pipe-and-cancel '~/.config/tmux/osc52.sh'

# Match neovim convention: 0 → end of line, $ → start of line
bind-key -T copy-mode-vi '0' send-keys -X end-of-line
bind-key -T copy-mode-vi '$' send-keys -X start-of-line

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on


# don't rename windows automatically, rename with ','
set-window-option -g automatic-rename off
set-option -g allow-rename off

# Use r to quickly reload tmux settings
unbind r
bind r \
	source-file ~/.tmux.conf \;\
	display 'Reloaded tmux config'

# Resize mode — prefix+hjkl enters, bare hjkl continue resizing, Esc/C-c exits.
bind h resize-pane -L 5 \; switch-client -T resize-mode \; set -g status-style 'bg=#fab387,fg=#1e1e2e' \; set -g status-left '#[bold] RESIZE '
bind j resize-pane -D 5 \; switch-client -T resize-mode \; set -g status-style 'bg=#fab387,fg=#1e1e2e' \; set -g status-left '#[bold] RESIZE '
bind k resize-pane -U 5 \; switch-client -T resize-mode \; set -g status-style 'bg=#fab387,fg=#1e1e2e' \; set -g status-left '#[bold] RESIZE '
bind l resize-pane -R 5 \; switch-client -T resize-mode \; set -g status-style 'bg=#fab387,fg=#1e1e2e' \; set -g status-left '#[bold] RESIZE '

bind -T resize-mode h resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode j resize-pane -D 5 \; switch-client -T resize-mode
bind -T resize-mode k resize-pane -U 5 \; switch-client -T resize-mode
bind -T resize-mode l resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode Escape switch-client -T root \; set -g status-style 'bg=#1e1e2e,fg=#cdd6f4' \; set -gu status-left
bind -T resize-mode C-c   switch-client -T root \; set -g status-style 'bg=#1e1e2e,fg=#cdd6f4' \; set -gu status-left

# Swap mode — prefix+HJKL enters, bare HJKL continue swapping, Esc/C-c exits.
bind H swap-pane -t '{left-of}'  \; switch-client -T swap-mode \; set -g status-style 'bg=#89b4fa,fg=#1e1e2e' \; set -g status-left '#[bold] SWAP '
bind J swap-pane -t '{down-of}'  \; switch-client -T swap-mode \; set -g status-style 'bg=#89b4fa,fg=#1e1e2e' \; set -g status-left '#[bold] SWAP '
bind K swap-pane -t '{up-of}'    \; switch-client -T swap-mode \; set -g status-style 'bg=#89b4fa,fg=#1e1e2e' \; set -g status-left '#[bold] SWAP '
bind L swap-pane -t '{right-of}' \; switch-client -T swap-mode \; set -g status-style 'bg=#89b4fa,fg=#1e1e2e' \; set -g status-left '#[bold] SWAP '

bind -T swap-mode H swap-pane -t '{left-of}'  \; switch-client -T swap-mode
bind -T swap-mode J swap-pane -t '{down-of}'  \; switch-client -T swap-mode
bind -T swap-mode K swap-pane -t '{up-of}'    \; switch-client -T swap-mode
bind -T swap-mode L swap-pane -t '{right-of}' \; switch-client -T swap-mode
bind -T swap-mode Escape switch-client -T root \; set -g status-style 'bg=#1e1e2e,fg=#cdd6f4' \; set -gu status-left
bind -T swap-mode C-c   switch-client -T root \; set -g status-style 'bg=#1e1e2e,fg=#cdd6f4' \; set -gu status-left

# fzf paste buffer picker — prefix+b
bind b run-shell "tmux display-popup -E '~/.config/tmux/fzf-buffer.sh #{pane_id}'"

# fzf pane mover — prefix+p: move current pane to any window across any session
bind p run-shell "tmux display-popup -E '~/.config/tmux/move-pane.sh #{pane_id} #{session_name}:#{window_index}'"

# fzf window mover — prefix+P: move current window to any session
bind P run-shell "tmux display-popup -E '~/.config/tmux/move-window.sh #{session_name}:#{window_index} #{session_name}'"

# ── Catppuccin Mocha theme ────────────────────────────────────────────────────
# base #1e1e2e  surface0 #313244  surface1 #45475a  overlay0 #6c7086
# text #cdd6f4  subtext1 #bac2de  subtext0 #a6adc8
# mauve #cba6f7  blue #89b4fa  peach #fab387  red #f38ba8  yellow #f9e2af

set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 100
set -g status "on"

set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Inactive window tab — ▌ and ▐ (half-block) create soft edges without nerd fonts
# index uses overlay1 (#7f849c) so it's readable but secondary to the name
set -g window-status-style 'bg=#313244,fg=#bac2de'
set -g window-status-format '#[fg=#1e1e2e,bg=#313244]▌#[fg=#7f849c,bg=#313244] #I #[fg=#bac2de,bg=#313244]#W #[fg=#1e1e2e,bg=#313244]▐'

# Active window tab — base text on mauve, bold name
set -g window-status-current-style 'bg=#cba6f7,fg=#1e1e2e'
set -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7]▌#[fg=#1e1e2e,bg=#cba6f7] #I #[fg=#1e1e2e,bg=#cba6f7,bold]#W #[fg=#1e1e2e,bg=#cba6f7]▐'

# Activity alert
set -g window-status-activity-style 'bg=#1e1e2e,fg=#f9e2af'
set -g window-status-separator ''

# Revert any previously applied pane dimming to terminal default
set -gu window-style
set -gu window-active-style

# Pane borders — heavy lines for thickness, status bar for unambiguous focus
set -g pane-border-lines heavy
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-style 'fg=#45475a'

# Pane title bar — active gets mauve, inactive get surface0/dimmed
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bg=#cba6f7 fg=#1e1e2e bold] #{pane_index} #{pane_current_command} #[default],#[bg=#313244 fg=#6c7086] #{pane_index} #{pane_current_command} #[default]}"

# Copy mode selection
set -g mode-style 'bg=#cba6f7,fg=#1e1e2e'

# Command/message bar
set -g message-style 'bg=#313244,fg=#cdd6f4'
set -g message-command-style 'bg=#313244,fg=#cdd6f4'

# Pane number overlay (prefix + q)
set -g display-panes-active-colour '#cba6f7'
set -g display-panes-colour '#585b70'

# Clock (prefix + t)
set -g clock-mode-colour '#89b4fa'

# Bell
set -g window-status-bell-style 'bg=#f38ba8,fg=#1e1e2e'

# Status right — date in subtext0, time in blue
set -g status-right '#[fg=#a6adc8,bg=#1e1e2e] %b %d %Y #[fg=#89b4fa,bg=#1e1e2e] %H:%M '

# Set the history limit so we get lots of scrollback.
setw -g history-limit 500000

